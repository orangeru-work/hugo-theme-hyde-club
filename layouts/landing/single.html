{{ define "main" -}}
<nav>
  <a href="/">Home</a> |
  <a href="{{ .CurrentSection.RelPermalink }}">{{ .CurrentSection.Title }}</a>
  {{ range .CurrentSection.Pages }}
     | <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
  {{ end }}
</nav>
<div class="post">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
</div>
{{- end }}
